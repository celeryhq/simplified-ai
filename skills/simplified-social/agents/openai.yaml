  short_description: "Draft, publish, and analyze social posts."
  icon_small: "assets/simplified-icon-256.png"
  icon_large: "assets/simplified-logo.png"
  brand_color: "#FFAD00"   # Simplified amber (wordmark gray: #43464E)

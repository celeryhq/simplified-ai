interface:
  display_name: "Cross-Platform Campaign"
  short_description: "Launch coordinated campaigns across channels."
  icon_small: "assets/simplified-icon-256.png"
  icon_large: "assets/simplified-logo.png"
  brand_color: "#FFAD00"
  default_prompt: "Use $cross-platform-campaign to turn my campaign brief into channel-ready social drafts."

dependencies:
  tools:
    - type: "mcp"
      value: "simplified"
      description: "Simplified hosted MCP connector for image and social workflows."
      transport: "http"
      url: "https://apikit.simplified.com/mcp"

policy:
  allow_implicit_invocation: true

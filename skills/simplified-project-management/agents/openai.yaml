interface:
  display_name: "Simplified Project Management"
  short_description: "Plan and manage Simplified PM boards safely."
  icon_small: "./assets/simplified-icon-256.png"
  icon_large: "./assets/simplified-logo.png"
  brand_color: "#FFAD00"
  default_prompt: "Use $simplified-project-management to show my active tasks and update their statuses."

dependencies:
  tools:
    - type: "mcp"
      value: "simplified"
      description: "Simplified hosted MCP connector for project-management and comment tools."
      transport: "streamable_http"
      url: "https://apikit.simplified.com/mcp"

policy:
  allow_implicit_invocation: true

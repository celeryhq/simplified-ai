interface:
  display_name: "Generate Video"
  short_description: "Generate AI video with current model schemas."
  default_prompt: "Use $generate-video to create a vertical product teaser video and save it as a reusable asset."

dependencies:
  tools:
    - type: "mcp"
      value: "simplified"
      description: "Simplified hosted MCP connector for AI video generation."
      transport: "http"
      url: "https://apikit.simplified.com/mcp"

policy:
  allow_implicit_invocation: true
